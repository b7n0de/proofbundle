[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proofbundle"
version = "0.1.0"
description = "Offline verifier for portable cryptographic evidence bundles: Ed25519 + RFC 6962 Merkle + optional SD-JWT."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Konrad Gruszka" }]
keywords = [
    "cryptography",
    "merkle",
    "transparency-log",
    "ed25519",
    "sd-jwt",
    "verifiable-credentials",
    "attestation",
    "provenance",
    "rfc6962",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
]
dependencies = ["cryptography>=42"]

[project.optional-dependencies]
dev = ["pytest>=7", "ruff>=0.5"]

[project.urls]
Homepage = "https://github.com/b7n0de/proofbundle"
Issues = "https://github.com/b7n0de/proofbundle/issues"

[project.scripts]
proofbundle = "proofbundle.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
