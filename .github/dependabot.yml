# Dependabot — keep GitHub Actions and Python deps current (supply-chain hygiene).
# Actions are SHA-pinned in the workflows; Dependabot bumps the pin + the version
# comment together, so pinning does not mean going stale.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels: ["dependencies", "github-actions"]
    # github/codeql-action pins are version-coupled (init writes the config that
    # analyze reads: "Loaded a configuration file for version X, but running Y"),
    # so single-action bumps go structurally red. Group them into ONE PR.
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels: ["dependencies", "python"]
