name: Release

# Build the distribution, then attach a signed SLSA build provenance
# attestation to it. This is the same trust-layer idea the library verifies:
# an artifact you ship should carry a verifiable proof of where it came from.
#
# Hardening note: pin these actions to full commit SHAs before you rely on this
# in anger. Version tags are used here only to keep the starter template readable.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # create the GitHub Release
  id-token: write        # keyless OIDC signing for the attestation
  attestations: write    # record the provenance attestation

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Generate SLSA build provenance for the artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # Optional next step, publish to PyPI with Trusted Publishing (OIDC, no token):
  # add a job using pypa/gh-action-pypi-publish@release/v1 with
  # permissions: id-token: write, after configuring a PyPI trusted publisher.
