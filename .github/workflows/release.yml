name: Release

# Build the distribution, attach a signed SLSA build provenance attestation, cut
# the GitHub Release, then publish to PyPI via Trusted Publishing (OIDC, no token).
# This is the same trust-layer idea the library verifies: an artifact you ship
# should carry a verifiable proof of where it came from.
#
# Supply-chain hardening: all actions are pinned to full commit SHAs (with the
# version in a comment), not tags — after the tj-actions incident (March 2025) a
# tag can be silently repointed. Dependabot (.github/dependabot.yml) bumps the pin.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # create the GitHub Release
  id-token: write        # keyless OIDC (attestation + PyPI Trusted Publishing)
  attestations: write    # record the provenance attestation

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Generate SLSA build provenance for the artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: "dist/*"

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    # Publishes with PyPI Trusted Publishing (OIDC) — no API token. Requires a
    # one-time human step: configure b7n0de/proofbundle + this workflow as a
    # trusted publisher on pypi.org (Settings → Publishing) BEFORE the first tag.
    # Until then this job fails cleanly and the Release above still succeeds.
    needs: build-and-attest
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publishing, OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          # Idempotent: a re-run of the same tag (e.g. a re-tag) must not fail on an
          # already-uploaded file — skip it instead of erroring.
          skip-existing: true
