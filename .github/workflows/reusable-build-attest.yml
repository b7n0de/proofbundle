name: reusable-build-attest

# Fundament F2 — the SLSA v1.0 Build Level 3 reusable signing workflow.
#
# SLSA L3 requires the build instructions to live in a REUSABLE workflow, shared and callable, with
# the attestation (signature) generated by that workflow separately from any caller's build logic
# (GitHub Docs: "Using artifact attestations and reusable workflows to achieve SLSA v1 Build Level 3";
# github.blog 2026-01-20). This is that workflow: build ONCE, deterministically, then attest THOSE
# exact bytes. Every release inherits L3 by calling it — no per-release rebuild of the attest logic.
#
# Determinism: the sdist is built via scripts/build_reproducible.py, which normalises the tarball to a
# byte-reproducible canonical form (SOURCE_DATE_EPOCH + canonical member metadata + zeroed gzip mtime).
# The determinism proof is sdist-only (the normaliser targets the sdist); the wheel is built and
# attested but NOT claimed byte-identical here (honest scope).
#
# dry_run=true exercises the BUILD + determinism half on a PR without producing (throwaway)
# attestations — so this workflow is live-tested by published-artifact-gate.yml, not a paper anchor.
# Actions pinned to full commit SHAs (version in comment), matching the repo's supply-chain hardening.

on:
  workflow_call:
    inputs:
      dry_run:
        description: "Build + prove determinism but skip attestation/upload (PR exercise)."
        type: boolean
        default: false
    outputs:
      sdist-sha256:
        description: "sha256 of the reproducible sdist."
        value: ${{ jobs.build-attest.outputs.sdist-sha256 }}

permissions:
  contents: read

jobs:
  build-attest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # keyless OIDC for the build-provenance attestation (only used when not dry_run)
      attestations: write    # record the provenance attestation (only used when not dry_run)
    outputs:
      sdist-sha256: ${{ steps.digests.outputs.sdist }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install the build frontend
        run: python -m pip install --upgrade build

      - name: Prove the sdist is byte-reproducible (two builds, byte-identical)
        run: python scripts/build_reproducible.py --check

      - name: Build the reproducible sdist + the wheel (the ONLY build here)
        run: |
          python scripts/build_reproducible.py --outdir dist
          python -m build --wheel --outdir dist

      - name: Record artifact digests (the attested subjects)
        id: digests
        run: |
          echo "sdist=$(sha256sum dist/*.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          sha256sum dist/* | tee dist/SHA256SUMS

      - name: Generate SLSA build provenance for the artifacts
        if: ${{ !inputs.dry_run }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: "dist/*.whl,dist/*.tar.gz"

      - name: Upload the attested dist (exact bytes, no rebuild downstream)
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: attested-dist
          path: dist/
          if-no-files-found: error
