<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="proofbundle social preview">
  <title>proofbundle</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <style>
      .mono { font-family: 'DejaVu Sans Mono','SFMono-Regular',Consolas,monospace; }
      .accent { fill: #2dd4bf; }
      .paper { fill: #ffffff; }
      .sub { fill: #94a3b8; }
      .chip { fill: #134e4a; stroke: #2dd4bf; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="8" fill="#2dd4bf"/>

  <!-- Shield + checkmark -->
  <g transform="translate(120,180)">
    <path d="M70 0 L128 20 V78 C128 118 98 146 70 160 C42 146 12 118 12 78 V20 Z" fill="#2dd4bf"/>
    <path d="M70 16 L112 30 V78 C112 108 90 130 70 142 C50 130 28 108 28 78 V30 Z" fill="#0f172a"/>
    <path d="M46 78 L64 96 L98 56" fill="none" stroke="#2dd4bf" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Merkle motif -->
  <g stroke="#2dd4bf" stroke-width="3" fill="none" opacity="0.55" transform="translate(300,190)">
    <line x1="60" y1="0" x2="30" y2="45"/><line x1="60" y1="0" x2="90" y2="45"/>
    <line x1="30" y1="45" x2="12" y2="90"/><line x1="30" y1="45" x2="48" y2="90"/>
    <line x1="90" y1="45" x2="72" y2="90"/><line x1="90" y1="45" x2="108" y2="90"/>
  </g>
  <g fill="#2dd4bf" opacity="0.8" transform="translate(300,190)">
    <circle cx="60" cy="0" r="8"/><circle cx="30" cy="45" r="7"/><circle cx="90" cy="45" r="7"/>
    <circle cx="12" cy="90" r="6"/><circle cx="48" cy="90" r="6"/><circle cx="72" cy="90" r="6"/><circle cx="108" cy="90" r="6"/>
  </g>

  <text x="470" y="250" class="mono paper" font-size="92" font-weight="700" letter-spacing="2">proofbundle</text>
  <text x="472" y="315" class="mono accent" font-size="30" letter-spacing="1">signed &#183; anchored &#183; verifiable offline</text>

  <text x="120" y="430" class="paper" font-family="'DejaVu Sans',sans-serif" font-size="34" font-weight="600">One JSON file. Three offline cryptographic checks. No server.</text>
  <text x="120" y="478" class="sub" font-family="'DejaVu Sans',sans-serif" font-size="26">Ed25519 signature + RFC 6962 Merkle inclusion + optional SD-JWT. Pure Python.</text>

  <!-- Chips -->
  <g class="mono" font-size="22" fill="#5eead4">
    <rect x="120" y="520" width="150" height="46" rx="23" class="chip"/><text x="195" y="550" text-anchor="middle">Ed25519</text>
    <rect x="286" y="520" width="180" height="46" rx="23" class="chip"/><text x="376" y="550" text-anchor="middle">RFC 6962</text>
    <rect x="482" y="520" width="150" height="46" rx="23" class="chip"/><text x="557" y="550" text-anchor="middle">SD-JWT</text>
    <rect x="648" y="520" width="180" height="46" rx="23" class="chip"/><text x="738" y="550" text-anchor="middle">offline</text>
    <rect x="844" y="520" width="200" height="46" rx="23" class="chip"/><text x="944" y="550" text-anchor="middle">MIT license</text>
  </g>

  <text x="1160" y="600" text-anchor="end" class="mono sub" font-size="22">github.com/b7n0de/proofbundle</text>
</svg>
