<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="proofbundle by b7n0de">
  <title>proofbundle — b7n0de, Verified AI Work</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14161a"/>
      <stop offset="1" stop-color="#1e2327"/>
    </linearGradient>
    <style>
      .mono { font-family: 'DejaVu Sans Mono','SFMono-Regular',Consolas,monospace; }
      .sans { font-family: Arial, Helvetica, 'DejaVu Sans', sans-serif; }
      .accent { fill: #D6248A; }
      .paper { fill: #f0f3f6; }
      .sub { fill: #9aa4af; }
      .chip { fill: none; stroke: #D6248A; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="8" fill="#D6248A"/>

  <!-- b7n0de brand wordmark -->
  <text x="120" y="150" class="sans paper" font-size="60" font-weight="800" letter-spacing="2">B7N<tspan class="accent">0</tspan>DE</text>
  <text x="124" y="184" class="sans sub" font-size="18" font-weight="600" letter-spacing="6">VERIFIED AI WORK</text>

  <!-- Shield + checkmark -->
  <g transform="translate(1040,70)">
    <path d="M60 0 L112 18 V70 C112 106 86 132 60 144 C34 132 8 106 8 70 V18 Z" fill="#D6248A"/>
    <path d="M60 14 L98 28 V70 C98 98 78 118 60 128 C42 118 22 98 22 70 V28 Z" fill="#14161a"/>
    <path d="M40 70 L55 86 L86 50" fill="none" stroke="#D6248A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="120" y="330" class="mono paper" font-size="96" font-weight="700" letter-spacing="2">proofbundle</text>
  <text x="122" y="392" class="mono accent" font-size="30" letter-spacing="1">emit &#183; verify &#183; fully offline</text>

  <text x="120" y="470" class="sans paper" font-size="32" font-weight="600">One JSON file. Three offline cryptographic checks. No server.</text>
  <text x="120" y="512" class="sans sub" font-size="24">Ed25519 signature + RFC 6962 Merkle inclusion + optional SD-JWT. Pure Python.</text>

  <!-- Chips -->
  <g class="mono accent" font-size="21">
    <rect x="120" y="548" width="140" height="44" rx="22" class="chip"/><text x="190" y="576" text-anchor="middle">Ed25519</text>
    <rect x="276" y="548" width="170" height="44" rx="22" class="chip"/><text x="361" y="576" text-anchor="middle">RFC 6962</text>
    <rect x="462" y="548" width="140" height="44" rx="22" class="chip"/><text x="532" y="576" text-anchor="middle">SD-JWT</text>
    <rect x="618" y="548" width="150" height="44" rx="22" class="chip"/><text x="693" y="576" text-anchor="middle">offline</text>
  </g>

  <text x="1160" y="600" text-anchor="end" class="mono sub" font-size="22">github.com/b7n0de/proofbundle</text>
</svg>
